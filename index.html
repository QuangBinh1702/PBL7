<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapillary Explorer — Khám phá bản đồ</title>

  <!-- MapillaryJS -->
  <link href="https://unpkg.com/mapillary-js@4.1.2/dist/mapillary.css" rel="stylesheet">
  <!-- MapLibre GL -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">

  <style>
    :root {
      --green: #05CB63;
      --green-dark: #36af6d;
      --green-dim: rgba(5, 203, 99, 0.35);
      --blue: #00bdff;
      --orange: #ff8400;
      --red: #e05643;
      --bg: #1a1b1e;
      --surface: #242528;
      --text: #f0f2f5;
      --text-muted: #9ca3af;
      --divider-width: 5px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ===== TOP BAR ===== */
    .topbar {
      height: 48px;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 50;
      position: relative;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      font-size: 1rem;
    }

    .logo-dot {
      width: 28px;
      height: 28px;
      background: var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-dot svg { width: 16px; height: 16px; fill: white; }

    .topbar-info {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .topbar-info span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .layer-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .2s ease;
      user-select: none;
    }

    .layer-toggle:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
    .layer-toggle.active { background: rgba(5,203,99,0.15); border-color: var(--green); color: var(--green); }

    .layer-toggle .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* ===== MAIN LAYOUT ===== */
    .app-container {
      position: relative;
      height: calc(100% - 48px);
      overflow: hidden;
    }

    #map {
      position: absolute;
      inset: 0;
    }

    #viewer {
      position: absolute;
      left: 16px;
      bottom: 16px;
      width: clamp(340px, 32vw, 460px);
      height: clamp(230px, 30vh, 340px);
      z-index: 20;
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.12);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      background: #111;
      transition: all .35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #viewer:hover {
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
      border-color: rgba(255,255,255,0.2);
    }

    #viewer.expanded {
      left: 0; bottom: 0;
      width: 50%; height: 100%;
      border-radius: 0;
      border: none;
      box-shadow: none;
    }

    .divider { display: none; }

    /* ===== VIEWER CONTROLS BAR ===== */
    .viewer-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 32px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      z-index: 25;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.85);
    }

    .viewer-bar-left { display: flex; align-items: center; gap: 4px; }
    .viewer-bar-right { display: flex; align-items: center; gap: 4px; }

    .viewer-bar button {
      background: none; border: none; color: #fff;
      cursor: pointer; padding: 2px 4px; font-size: 0.85rem;
      opacity: 0.7; transition: opacity .15s;
    }
    .viewer-bar button:hover { opacity: 1; }

    .viewer-date { color: rgba(255,255,255,0.7); font-size: 0.7rem; }

    .viewer-expand-btn {
      position: absolute;
      top: 8px; right: 8px;
      width: 28px; height: 28px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; z-index: 26;
      transition: background .15s;
    }
    .viewer-expand-btn:hover { background: rgba(0,0,0,0.7); }

    /* ===== IMAGE HOVER PREVIEW ===== */
    .image-hover-preview {
      position: fixed;
      width: 180px; height: 120px;
      background: #111;
      border-radius: 8px;
      border: 2px solid var(--green);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      z-index: 999;
      pointer-events: none;
      overflow: hidden;
      display: none;
      transition: opacity .15s ease;
    }
    .image-hover-preview img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* ===== VIEWER OVERLAY INFO ===== */
    .viewer-overlay {
      position: absolute;
      bottom: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      pointer-events: none;
      z-index: 5;
    }

    .image-info {
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.85);
      pointer-events: auto;
      max-width: 320px;
    }

    .image-info .label { color: var(--text-muted); font-size: 0.7rem; }
    .image-info .value { color: white; font-weight: 500; }

    /* ===== MAP OVERLAY CONTROLS ===== */
    .map-controls {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 5;
    }

    .map-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: rgba(36, 37, 40, 0.9);
      backdrop-filter: blur(8px);
      color: white;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: background .2s ease;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .map-btn:hover { background: rgba(60, 63, 68, 0.95); }

    /* ===== SEARCH BOX ===== */
    .search-box {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 5;
    }

    .search-input {
      width: 280px;
      padding: 10px 14px 10px 38px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(36, 37, 40, 0.92);
      backdrop-filter: blur(12px);
      color: white;
      font-size: 0.85rem;
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease;
    }

    .search-input::placeholder { color: rgba(255,255,255,0.35); }
    .search-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(5, 203, 99, 0.15);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 0.9rem;
      pointer-events: none;
    }

    /* ===== LEGEND ===== */
    .legend {
      position: absolute;
      bottom: 12px;
      left: 500px;
      background: rgba(36, 37, 40, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.72rem;
      z-index: 5;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .legend-title {
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.65rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 2px 0;
      color: rgba(255,255,255,0.75);
    }

    .legend-color {
      width: 12px;
      height: 3px;
      border-radius: 1px;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* ===== LOADING OVERLAY ===== */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(17, 17, 17, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      transition: opacity .4s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      margin-top: 12px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* ===== TOKEN PROMPT ===== */
    .token-prompt {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .token-prompt.hidden { display: none; }

    .token-card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 36px;
      max-width: 480px;
      width: calc(100% - 32px);
      text-align: center;
    }

    .token-card h2 {
      font-size: 1.3rem;
      margin-bottom: 8px;
    }

    .token-card p {
      color: var(--text-muted);
      font-size: 0.88rem;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .token-card a {
      color: var(--green);
      text-decoration: none;
    }

    .token-card a:hover { text-decoration: underline; }

    .token-input-wrap {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .token-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.3);
      color: white;
      font-size: 0.9rem;
      font-family: monospace;
      outline: none;
    }

    .token-input:focus { border-color: var(--green); }

    .token-submit {
      padding: 12px 24px;
      border-radius: 10px;
      border: none;
      background: var(--green);
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background .2s ease;
    }

    .token-submit:hover { background: var(--green-dark); }

    .token-error {
      color: var(--red);
      font-size: 0.8rem;
      min-height: 20px;
    }

    /* ===== COORDS DISPLAY ===== */
    .coords-display {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(36, 37, 40, 0.9);
      backdrop-filter: blur(8px);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.72rem;
      color: var(--text-muted);
      font-family: monospace;
      z-index: 5;
      border: 1px solid rgba(255,255,255,0.06);
    }

    /* ===== FILTER PANELS ===== */
    .filter-panels {
      position: fixed;
      top: 60px;
      right: 16px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .filter-panel {
      pointer-events: auto;
      background: rgba(255,255,255,0.97);
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      width: 270px;
      color: #1a1b1e;
      font-size: 0.85rem;
      user-select: none;
    }

    .filter-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #e5e7eb;
    }

    .filter-header-left {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      color: #1a1b1e;
    }

    .filter-download-btn {
      background: none;
      border: none;
      color: var(--green);
      font-weight: 600;
      font-size: 0.78rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .filter-download-btn:hover { background: rgba(5,203,99,0.1); }

    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 8px 14px 4px;
      min-height: 0;
    }

    .filter-tags:empty { display: none; }

    .filter-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 14px;
      background: #1a1b1e;
      color: #fff;
      font-size: 0.73rem;
      font-weight: 500;
      cursor: default;
    }

    .filter-tag img { width: 14px; height: 14px; object-fit: contain; filter: brightness(10); }
    .filter-tag .tag-x {
      cursor: pointer;
      margin-left: 2px;
      opacity: 0.7;
      font-size: 0.7rem;
    }
    .filter-tag .tag-x:hover { opacity: 1; }

    .filter-dropdown-wrap { position: relative; padding: 6px 14px 10px; }

    .filter-dropdown-btn {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: #fff;
      color: #9ca3af;
      font-size: 0.82rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .filter-dropdown-btn:hover { border-color: #6b7280; }

    .filter-dropdown-list {
      display: none;
      position: absolute;
      top: 100%;
      left: 14px;
      right: 14px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      max-height: 400px;
      overflow-y: auto;
      z-index: 30;
      margin-top: 2px;
    }

    .filter-dropdown-list.open { display: block; }

    .filter-dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.82rem;
      color: #374151;
      transition: background .1s;
    }

    .filter-dropdown-item:first-child { border-radius: 8px 8px 0 0; }
    .filter-dropdown-item:last-child { border-radius: 0 0 8px 8px; }
    .filter-dropdown-item:hover { background: #f3f4f6; }
    .filter-dropdown-item.selected { background: #eff6ff; font-weight: 600; }

    .filter-dropdown-item .obj-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .filter-dropdown-item .obj-icon img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .filter-count {
      padding: 4px 14px 8px;
      font-size: 0.7rem;
      color: #9ca3af;
    }

    /* ===== DETECTION PANEL ===== */
    .detection-panel {
      position: fixed;
      top: 60px;
      left: 16px;
      bottom: 16px;
      width: 360px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      z-index: 50;
      display: none;
      flex-direction: column;
      overflow: hidden;
      color: #1a1b1e;
    }

    .detection-panel.open { display: flex; }

    .detection-header {
      padding: 14px 16px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .detection-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .detection-header-left img {
      width: 28px; height: 28px;
      object-fit: contain;
    }

    .detection-header-left span {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .detection-close {
      background: none; border: none;
      font-size: 1.2rem; cursor: pointer;
      color: #6b7280; padding: 4px 8px;
      border-radius: 6px;
    }
    .detection-close:hover { background: #f3f4f6; }

    .detection-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .detection-card {
      margin: 6px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
    }

    .detection-card:hover {
      border-color: #05CB63;
      box-shadow: 0 2px 12px rgba(5,203,99,0.15);
    }

    .detection-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      font-size: 0.8rem;
      color: #6b7280;
    }

    .detection-card-header .det-num {
      font-weight: 700;
      font-size: 1rem;
      color: #1a1b1e;
    }

    .detection-card-img {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #f3f4f6;
    }

    .detection-card-img img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .detection-bbox {
      position: absolute;
      border: 3px solid #ff0000;
      background: rgba(255,0,0,0.12);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.7), 0 0 8px rgba(255,0,0,0.4);
      pointer-events: none;
      border-radius: 2px;
      animation: bbox-blink 1.5s ease-in-out infinite;
    }

    @keyframes bbox-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .detection-footer {
      padding: 10px 16px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .detection-nav-btn {
      padding: 8px 20px;
      border-radius: 20px;
      border: none;
      background: var(--green);
      color: #fff;
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .detection-nav-btn:hover { background: var(--green-dark); }
    .detection-nav-btn:disabled { background: #d1d5db; cursor: default; }

    .detection-page-info {
      font-size: 0.75rem;
      color: #9ca3af;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      #viewer {
        left: 8px;
        right: 8px;
        bottom: 8px;
        width: auto;
        height: 35vh;
        min-height: 180px;
      }
      .search-input { width: 180px; }
      .filter-panels { right: 8px; top: 56px; }
      .filter-panel { width: 220px; }
      .legend { display: none; }
    }
  </style>
</head>
<body>

  <!-- TOKEN PROMPT -->
  <div class="token-prompt" id="tokenPrompt">
    <div class="token-card">
      <div class="logo-dot" style="margin:0 auto 16px; width:48px; height:48px;">
        <svg viewBox="0 0 24 24" style="width:24px;height:24px"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      </div>
      <h2>Mapillary Explorer</h2>
      <p>
        Nhập Mapillary Access Token để bắt đầu khám phá.<br>
        Lấy token tại <a href="https://www.mapillary.com/dashboard/developers" target="_blank">mapillary.com/dashboard/developers</a>
      </p>
      <div class="token-input-wrap">
        <input type="text" class="token-input" id="tokenInput" placeholder="MLY|xxxx|yyyy" spellcheck="false">
        <button class="token-submit" id="tokenSubmit">Bắt đầu</button>
      </div>
      <div class="token-error" id="tokenError"></div>
    </div>
  </div>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="#" class="logo">
        <div class="logo-dot">

  <!-- SCRIPTS -->
  <script src="https://unpkg.com/mapillary-js@4.1.2/dist/mapillary.js"></script>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <script>
    // ===== CONFIG =====
    const DEFAULT_LAT = 16.074492656166598;
    const DEFAULT_LNG = 108.14910494442813;
    const DEFAULT_ZOOM = 18;
    const DEFAULT_PKEY = '1137674664114306';
    const STORAGE_KEY = 'mapillary_token';

    // ===== STATE =====
    let mlToken = localStorage.getItem(STORAGE_KEY) || '';
    let viewer = null;
    let map = null;
    let currentImageId = null;
    let currentLngLat = null;
    let currentBearing = 0;
    let syncingFromViewer = false;
    let syncingFromMap = false;
    let urlUpdateTimer = null;

    // ===== URL PARAMS =====
    function getUrlParams() {
      const p = new URLSearchParams(window.location.search);
      return {
        lat: parseFloat(p.get('lat')) || DEFAULT_LAT,
        lng: parseFloat(p.get('lng')) || DEFAULT_LNG,
        z: parseFloat(p.get('z')) || DEFAULT_ZOOM,
        pKey: p.get('pKey') || DEFAULT_PKEY,
      };
    }

    function updateUrl(lat, lng, z, pKey) {
      clearTimeout(urlUpdateTimer);
      urlUpdateTimer = setTimeout(() => {
        const url = new URL(window.location);
        url.searchParams.set('lat', lat.toFixed(7));
        url.searchParams.set('lng', lng.toFixed(7));
        url.searchParams.set('z', z.toFixed(2));
        if (pKey) url.searchParams.set('pKey', pKey);
        history.replaceState(null, '', url.toString());
      }, 150);
    }

    // ===== TOKEN FLOW =====
    const tokenPrompt = document.getElementById('tokenPrompt');
    const tokenInput = document.getElementById('tokenInput');
    const tokenSubmit = document.getElementById('tokenSubmit');
    const tokenError = document.getElementById('tokenError');

    if (mlToken) {
      tokenPrompt.classList.add('hidden');
      initApp(mlToken);
    }

    tokenSubmit.addEventListener('click', handleTokenSubmit);
    tokenInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleTokenSubmit(); });

    function handleTokenSubmit() {
      const val = tokenInput.value.trim();
      if (!val) {
        tokenError.textContent = 'Vui lòng nhập token.';
        return;
      }
      tokenError.textContent = '';
      mlToken = val;
      localStorage.setItem(STORAGE_KEY, val);
      tokenPrompt.classList.add('hidden');
      initApp(val);
    }

    // ===== MAIN INIT =====
    function initApp(token) {
      const params = getUrlParams();
      initViewer(token, params);
      initMap(token, params);
      initDivider();
      initLayerToggles();
      initMapControls();
    }

    // ===== MAPILLARY VIEWER =====
    function initViewer(token, params) {
      const { Viewer: MlyViewer } = mapillary;

      viewer = new MlyViewer({
        accessToken: token,
        container: 'viewer',
        imageId: params.pKey,
        component: {
          cover: false,
          bearing: true,
          direction: true,
          sequence: true,
          zoom: true,
          keyboard: true,
          pointer: true,
          image: true,
          cache: true,
        },
      });

      const loadingEl = document.getElementById('viewerLoading');

      viewer.on('load', () => {
        loadingEl.classList.add('hidden');
      });

      viewer.on('image', (e) => {
        const img = e.image;
        currentImageId = img.id;
        currentLngLat = img.lngLat;
        currentBearing = img.compassAngle || 0;

        // Fetch and show date
        fetchImageDate(img.id);
        document.getElementById('infoDate').textContent = `📷 ${img.id}`;

        // Sync map
        if (!syncingFromMap && map) {
          syncingFromViewer = true;
          map.easeTo({
            center: [img.lngLat.lng, img.lngLat.lat],
            duration: 500,
          });
          updateCameraMarker(img.lngLat.lng, img.lngLat.lat, currentBearing);
          setTimeout(() => { syncingFromViewer = false; }, 600);
        }

        // Update URL
        if (map) {
          updateUrl(img.lngLat.lat, img.lngLat.lng, map.getZoom(), img.id);
        }
      });

      viewer.on('bearing', (e) => {
        currentBearing = e.bearing;
        if (currentLngLat && map) {
          updateCameraMarker(currentLngLat.lng, currentLngLat.lat, e.bearing);
        }
      });

      viewer.on('position', async () => {
        try {
          const pos = await viewer.getPosition();
          currentLngLat = pos;
          document.getElementById('infoCoords').textContent =
            `${pos.lat.toFixed(5)}, ${pos.lng.toFixed(5)}`;

          if (!syncingFromMap && map) {
            syncingFromViewer = true;
            map.easeTo({ center: [pos.lng, pos.lat], duration: 300 });
            updateCameraMarker(pos.lng, pos.lat, currentBearing);
            setTimeout(() => { syncingFromViewer = false; }, 400);
          }
        } catch (e) {}
      });
    }

    // ===== MAPLIBRE MAP =====
    function initMap(token, params) {
      const encodedToken = encodeURIComponent(token);

      map = new maplibregl.Map({
        container: 'map',
        center: [params.lng, params.lat],
        zoom: params.z,
        bearing: 0,
        pitch: 0,
        style: {
          version: 8,
          sources: {
            osm: {
              type: 'raster',
              tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
              tileSize: 256,
              attribution: '© OpenStreetMap contributors',
            },
          },
          layers: [{ id: 'osm', type: 'raster', source: 'osm' }],
        },
      });

      map.addControl(new maplibregl.ScaleControl(), 'bottom-right');

      map.on('load', () => {
        const LOCAL_API = 'http://localhost:3000/api/v1';

        // ===== COVERAGE SOURCE =====
        map.addSource('mly-coverage', {
          type: 'vector',
          tiles: [
            `https://tiles.mapillary.com/maps/vtp/mly1_public/2/{z}/{x}/{y}?access_token=${encodedToken}`,
          ],
          minzoom: 0,
          maxzoom: 14,
        });

        // Sequence lines (green coverage)
        map.addLayer({
          id: 'mly-sequences',
          type: 'line',
          source: 'mly-coverage',
          'source-layer': 'sequence',
          minzoom: 6,
          layout: { 'line-cap': 'round', 'line-join': 'round' },
          paint: {
            'line-color': '#05CB63',
            'line-width': ['interpolate', ['linear'], ['zoom'], 6, 1, 14, 2, 18, 3],
            'line-opacity': 0.75,
          },
        });

        // Image dots
        map.addLayer({
          id: 'mly-images',
          type: 'circle',
          source: 'mly-coverage',
          'source-layer': 'image',
          minzoom: 14,
          paint: {
            'circle-radius': ['interpolate', ['linear'], ['zoom'], 14, 3, 20, 6],
            'circle-color': '#ffffff',
            'circle-stroke-color': '#05CB63',
            'circle-stroke-width': 2,
            'circle-opacity': 0.9,
          },
        });

        // ===== MAP FEATURES (POINTS) — served from local backend MVT =====
        map.addSource('mly-features', {
          type: 'vector',
          tiles: [
            `${LOCAL_API.replace('/api/v1', '')}/api/v1/tiles/map-features/{z}/{x}/{y}.mvt`,
          ],
          minzoom: 14,
          maxzoom: 14,
        });

        map.addLayer({
          id: 'mly-feature-points',
          type: 'symbol',
          source: 'mly-features',
          'source-layer': 'point',
          minzoom: 14,
          layout: {
            'icon-image': ['concat', 'pt:', ['get', 'value']],
            'icon-size': ['interpolate', ['linear'], ['zoom'], 14, 0.6, 18, 0.85, 20, 1.0],
            'icon-allow-overlap': true,
            'icon-ignore-placement': true,
            'icon-rotation-alignment': 'viewport',
            'icon-pitch-alignment': 'viewport',
          },
        });

        // ===== TRAFFIC SIGNS — served from local backend MVT =====
        map.addSource('mly-signs', {
          type: 'vector',
          tiles: [
            `${LOCAL_API.replace('/api/v1', '')}/api/v1/tiles/traffic-signs/{z}/{x}/{y}.mvt`,
          ],
          minzoom: 14,
          maxzoom: 14,
        });

        map.addLayer({
          id: 'mly-traffic-signs',
          type: 'symbol',
          source: 'mly-signs',
          'source-layer': 'traffic_sign',
          minzoom: 14,
          layout: {
            'icon-image': ['concat', 'sg:', ['get', 'value']],
            'icon-size': ['interpolate', ['linear'], ['zoom'], 14, 0.5, 18, 0.7, 20, 0.9],
            'icon-allow-overlap': true,
            'icon-ignore-placement': true,
            'icon-rotation-alignment': 'viewport',
            'icon-pitch-alignment': 'viewport',
          },
        });

        // ===== CAMERA MARKER SOURCE =====
        map.addSource('camera-point', {
          type: 'geojson',
          data: { type: 'FeatureCollection', features: [] },
        });

        map.addSource('camera-cone', {
          type: 'geojson',
          data: { type: 'FeatureCollection', features: [] },
        });

        // Camera cone fill
        map.addLayer({
          id: 'camera-cone-fill',
          type: 'fill',
          source: 'camera-cone',
          paint: {
            'fill-color': '#05CB63',
            'fill-opacity': 0.2,
          },
        });

        // Camera cone outline
        map.addLayer({
          id: 'camera-cone-line',
          type: 'line',
          source: 'camera-cone',
          paint: {
            'line-color': '#05CB63',
            'line-width': 2,
            'line-opacity': 0.6,
          },
        });

        // Camera dot
        map.addLayer({
          id: 'camera-dot',
          type: 'circle',
          source: 'camera-point',
          paint: {
            'circle-radius': 7,
            'circle-color': '#05CB63',
            'circle-stroke-color': '#ffffff',
            'circle-stroke-width': 3,
          },
        });

        // Initial camera marker
        if (params.lat && params.lng) {
          updateCameraMarker(params.lng, params.lat, 0);
        }

        // ===== HOVER & SELECTION RING LAYERS =====
        const EMPTY_FC = { type: 'FeatureCollection', features: [] };

        map.addSource('feature-hover', { type: 'geojson', data: EMPTY_FC });
        map.addSource('feature-selected', { type: 'geojson', data: EMPTY_FC });

        // Selected ring (larger, colored fill)
        map.addLayer({
          id: 'feature-selected-ring',
          type: 'circle',
          source: 'feature-selected',
          paint: {
            'circle-radius': ['interpolate', ['linear'], ['zoom'], 14, 14, 20, 24],
            'circle-color': ['match', ['get', 'kind'], 'sign', 'rgba(255,132,0,0.18)', 'rgba(124,58,237,0.18)'],
            'circle-stroke-color': ['match', ['get', 'kind'], 'sign', '#ff8400', '#7c3aed'],
            'circle-stroke-width': 3,
          },
        });

        // Hover ring (white for features, green for images)
        map.addLayer({
          id: 'feature-hover-ring',
          type: 'circle',
          source: 'feature-hover',
          paint: {
            'circle-radius': ['interpolate', ['linear'], ['zoom'], 14, 11, 20, 19],
            'circle-color': ['match', ['get', 'kind'], 'image', 'rgba(5,203,99,0.15)', 'rgba(255,255,255,0)'],
            'circle-stroke-color': ['match', ['get', 'kind'], 'image', '#05CB63', '#ffffff'],
            'circle-stroke-width': 2.5,
            'circle-stroke-opacity': 0.9,
          },
        });

        // ===== HIT TESTING HELPERS =====
        const FEATURE_LAYERS = ['mly-feature-points', 'mly-traffic-signs'];
        const IMAGE_LAYERS = ['mly-images', 'mly-sequences'];
        let hoveredKey = null;
        let selectedKey = null;

        function featureKey(f) {
          return `${f.layer.id}|${f.properties.id || ''}|${f.geometry.coordinates.join(',')}`;
        }

        function getFeatureAtPoint(point, padding) {
          const bbox = [[point.x - padding, point.y - padding], [point.x + padding, point.y + padding]];
          return map.queryRenderedFeatures(bbox, { layers: FEATURE_LAYERS })[0] || null;
        }

        function setRingData(sourceId, feature) {
          const kind = feature.layer.id === 'mly-traffic-signs' ? 'sign' : 'point';
          map.getSource(sourceId).setData({
            type: 'FeatureCollection',
            features: [{ type: 'Feature', geometry: feature.geometry, properties: { kind, value: feature.properties.value || '' } }],
          });
        }

        function clearRing(sourceId) {
          const src = map.getSource(sourceId);
          if (src) src.setData(EMPTY_FC);
        }

        // ===== HOVER WITH PREVIEW =====
        const hoverPreview = document.getElementById('imageHoverPreview');
        const hoverImg = document.getElementById('imageHoverImg');
        let hoveredImageId = null;
        let previewTimeout = null;

        map.on('mousemove', (e) => {
          // Coords
          document.getElementById('coordsDisplay').textContent =
            `${e.lngLat.lat.toFixed(6)}, ${e.lngLat.lng.toFixed(6)} | Z${map.getZoom().toFixed(1)}`;

          // Check feature hit (padded for easier hover)
          const feat = getFeatureAtPoint(e.point, 12);

          if (feat) {
            map.getCanvas().style.cursor = 'pointer';
            const key = featureKey(feat);
            if (key !== hoveredKey) {
              hoveredKey = key;
              setRingData('feature-hover', feat);
            }
            hideImagePreview();
            return;
          }

          // Check image dots for hover preview + ring (both Coverage AND Local DB)
          const imgLayers = ['mly-images'];
          if (map.getLayer('local-images-dots')) imgLayers.push('local-images-dots');

          const imgHit = map.queryRenderedFeatures(
            [[e.point.x - 8, e.point.y - 8], [e.point.x + 8, e.point.y + 8]],
            { layers: imgLayers }
          )[0];

          if (imgHit) {
            map.getCanvas().style.cursor = 'pointer';
            if (hoveredKey) { hoveredKey = null; clearRing('feature-hover'); }

            const isLocal = imgHit.layer.id === 'local-images-dots';
            const imgId = imgHit.properties.id;
            const ringColor = isLocal ? 'local' : 'image';

            // Show hover ring — cyan for local, green for coverage
            const emptyFC = { type: 'FeatureCollection', features: [] };
            if (isLocal && map.getSource('local-hover')) {
              map.getSource('local-hover').setData({
                type: 'FeatureCollection',
                features: [{ type: 'Feature', geometry: imgHit.geometry, properties: {} }],
              });
              clearRing('feature-hover');

              // Show compass fan (mini cone showing camera direction)
              const compass = imgHit.properties.compass_angle;
              if (compass != null && map.getSource('local-compass')) {
                const [lng, lat] = imgHit.geometry.coordinates;
                const fanFov = 70;
                const fanDist = 8; // meters
                const fanSteps = 8;
                const fanCoords = [[lng, lat]];
                for (let fi = 0; fi <= fanSteps; fi++) {
                  const angle = compass - fanFov / 2 + (fanFov * fi / fanSteps);
                  fanCoords.push(offsetPoint(lng, lat, angle, fanDist));
                }
                fanCoords.push([lng, lat]);
                map.getSource('local-compass').setData({
                  type: 'FeatureCollection',
                  features: [{ type: 'Feature', geometry: { type: 'Polygon', coordinates: [fanCoords] }, properties: {} }],
                });
              }
            } else {
              map.getSource('feature-hover').setData({
                type: 'FeatureCollection',
                features: [{ type: 'Feature', geometry: imgHit.geometry, properties: { kind: 'image' } }],
              });
              if (map.getSource('local-hover')) map.getSource('local-hover').setData(emptyFC);
              if (map.getSource('local-compass')) map.getSource('local-compass').setData(emptyFC);
            }

            // Show thumbnail preview
            if (imgId && String(imgId) !== String(hoveredImageId)) {
              hoveredImageId = imgId;
              showImagePreview(String(imgId), e.originalEvent);
            } else {
              positionPreview(e.originalEvent);
            }
            return;
          }

          // Check sequences for cursor
          const seqHit = map.queryRenderedFeatures(
            [[e.point.x - 6, e.point.y - 6], [e.point.x + 6, e.point.y + 6]],
            { layers: ['mly-sequences'] }
          )[0];
          map.getCanvas().style.cursor = seqHit ? 'pointer' : '';

          if (hoveredKey) { hoveredKey = null; clearRing('feature-hover'); }
          if (map.getSource('local-hover')) map.getSource('local-hover').setData({ type: 'FeatureCollection', features: [] });
          if (map.getSource('local-compass')) map.getSource('local-compass').setData({ type: 'FeatureCollection', features: [] });
          hideImagePreview();
        });

        function showImagePreview(imageId, evt) {
          clearTimeout(previewTimeout);
          // Fetch thumb URL via local backend API
          fetch(`http://localhost:3000/api/v1/images/provider/${imageId}`)
          .then(r => r.json())
          .then(json => {
            if (json.data?.thumb_256_url && hoveredImageId === imageId) {
              hoverImg.src = `http://localhost:3000${json.data.thumb_256_url}`;
              hoverPreview.style.display = 'block';
            }
          })
          .catch(() => {});
          positionPreview(evt);
        }

        function positionPreview(evt) {
          if (hoverPreview.style.display === 'none') return;
          hoverPreview.style.left = (evt.clientX + 16) + 'px';
          hoverPreview.style.top = (evt.clientY - 130) + 'px';
        }

        function hideImagePreview() {
          hoveredImageId = null;
          hoverPreview.style.display = 'none';
          hoverImg.src = '';
        }

        map.on('mouseleave', () => {
          hideImagePreview();
          clearRing('feature-hover');
          hoveredKey = null;
        });

        // ===== CLICK =====
        map.on('click', (e) => {
          hideImagePreview();

          // 1. Check feature points/signs first
          const feat = getFeatureAtPoint(e.point, 12);
          if (feat) {
            selectedKey = featureKey(feat);
            setRingData('feature-selected', feat);
            const val = feat.properties.value || 'Unknown';
            const featureId = feat.properties.id;
            const isSigns = feat.layer.id === 'mly-traffic-signs';

            // Open detection panel with images
            if (featureId) {
              const label = isSigns ? (SIGN_TYPES_MAP[val]?.label || val.replace(/--/g, ' › ').replace(/_/g, ' ')) : (POINT_TYPES_MAP[val]?.label || val);
              const iconUrl = isSigns ? getSignIconUrl(val) : getPointIconUrl(val);
              openDetectionPanel(featureId, label, iconUrl, feat.geometry.coordinates);
            }

            // Also navigate to nearest image
            findNearestImage(feat.geometry.coordinates[0], feat.geometry.coordinates[1]);
            return;
          }

          // 2. Check image dots (Coverage + Local DB)
          const clickImgLayers = ['mly-images'];
          if (map.getLayer('local-images-dots')) clickImgLayers.push('local-images-dots');

          const imgHit = map.queryRenderedFeatures(
            [[e.point.x - 6, e.point.y - 6], [e.point.x + 6, e.point.y + 6]],
            { layers: clickImgLayers }
          )[0];
          if (imgHit) {
            const imageId = imgHit.properties.id;
            const isLocal = imgHit.layer.id === 'local-images-dots';

            // Show selected ring

              map.getSource('local-selected').setData({
                type: 'FeatureCollection',
                features: [{ type: 'Feature', geometry: imgHit.geometry, properties: {} }],

              clearRing('feature-selected');
            } else {

                map.getSource('local-selected').setData({ type: 'FeatureCollection', features: [] });
              }

            if (imageId) navigateViewer(String(imageId));
            selectedKey = null;
            return;

          // 3. Check sequence lines
          const seqHit = map.queryRenderedFeatures(
            [[e.point.x - 8, e.point.y - 8], [e.point.x + 8, e.point.y + 8]],
            { layers: ['mly-sequences'] }
          )[0];
          if (seqHit) {
            const imageId = seqHit.properties.image_id || seqHit.properties.id;

            else findNearestImage(e.lngLat.lng, e.lngLat.lat);
            selectedKey = null; clearRing('feature-selected');

        // Build sequence lines from sorted images (connect nearby consecutive points)
        function buildSequenceLines(images) {
          const lines = [];
          // Group images by sequence_id
          const groups = {};
          for (const img of images) {
            if (!img.sequence_id) continue; // skip images without sequence
            if (!groups[img.sequence_id]) groups[img.sequence_id] = [];
            groups[img.sequence_id].push(img);
          }
          // For each sequence, sort by captured_at and build a LineString
          for (const seqId of Object.keys(groups)) {
            const seqImages = groups[seqId];
            if (seqImages.length < 2) continue;
            seqImages.sort((a, b) => new Date(a.captured_at) - new Date(b.captured_at));
            const coords = seqImages.map(img => [img.lon, img.lat]);
            lines.push({
              type: 'Feature',
              geometry: { type: 'LineString', coordinates: coords },
              properties: { sequence_id: seqId }
            });
          }
          return { type: 'FeatureCollection', features: lines };
        }

        // Fetch & render local images — with debounce + abort
        let _loadAbort = null;
        let _loadTimer = null;
        let _lastBbox = '';

        async function loadLocalImages() {
          const empty = { type: 'FeatureCollection', features: [] };
          if (map.getZoom() < 10) {
            map.getSource('local-images').setData(empty);
            map.getSource('local-lines').setData(empty);
            return;
          }
          const bounds = map.getBounds();
          const bbox = `${bounds.getWest()},${bounds.getSouth()},${bounds.getEast()},${bounds.getNorth()}`;

          // Skip if bbox hasn't changed
          if (bbox === _lastBbox) return;
          _lastBbox = bbox;

          // Abort previous in-flight request
          if (_loadAbort) _loadAbort.abort();
          _loadAbort = new AbortController();
          const signal = _loadAbort.signal;

          const zoom = map.getZoom();
          const limit = zoom >= 16 ? 5000 : zoom >= 14 ? 3000 : zoom >= 12 ? 1500 : 500;
          try {
            const res = await fetch(`${LOCAL_API}/images?bbox=${bbox}&limit=${limit}`, { signal });
            if (signal.aborted) return;
            const json = await res.json();
            if (signal.aborted) return;
            const images = json.data;

            // Points
            map.getSource('local-images').setData({
              type: 'FeatureCollection',
              features: images.map(img => ({
                type: 'Feature',
                geometry: { type: 'Point', coordinates: [img.lon, img.lat] },
                properties: {
                  id: img.provider_image_id,
                  captured_at: img.captured_at,
                  compass_angle: img.compass_angle,
                  is_pano: img.is_pano,
                },
              })),
            });

            // Lines
            map.getSource('local-lines').setData(buildSequenceLines(images));
          } catch (e) {
            if (e.name === 'AbortError') return;
          }
        }

        function debouncedLoadLocalImages() {
          clearTimeout(_loadTimer);
          _loadTimer = setTimeout(loadLocalImages, 200);
        }

        map.on('moveend', debouncedLoadLocalImages);
        loadLocalImages();


      });

    // ===== CAMERA MARKER =====
    function updateCameraMarker(lng, lat, bearingDeg) {
      if (!map || !map.getSource('camera-point')) return;

      // Update point
      map.getSource('camera-point').setData({
        type: 'FeatureCollection',
        features: [{
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [lng, lat] },
        }],
      });

      // Build cone polygon
      const fovDeg = 70;
      const lengthM = 25;
      const leftAngle = bearingDeg - fovDeg / 2;
      const rightAngle = bearingDeg + fovDeg / 2;

      const steps = 12;
      const coords = [[lng, lat]];
      for (let i = 0; i <= steps; i++) {
        const angle = leftAngle + (rightAngle - leftAngle) * (i / steps);
        const pt = offsetPoint(lng, lat, angle, lengthM);
        coords.push(pt);
      }
      coords.push([lng, lat]);

      map.getSource('camera-cone').setData({
        type: 'FeatureCollection',
        features: [{
          type: 'Feature',
          geometry: { type: 'Polygon', coordinates: [coords] },
        }],
      });
    }

    function offsetPoint(lng, lat, bearingDeg, distanceMeters) {
      const R = 6371000;
      const d = distanceMeters / R;
      const brng = (bearingDeg * Math.PI) / 180;
      const lat1 = (lat * Math.PI) / 180;
      const lng1 = (lng * Math.PI) / 180;
      const lat2 = Math.asin(
        Math.sin(lat1) * Math.cos(d) + Math.cos(lat1) * Math.sin(d) * Math.cos(brng)
      );
      const lng2 = lng1 + Math.atan2(
        Math.sin(brng) * Math.sin(d) * Math.cos(lat1),
        Math.cos(d) - Math.sin(lat1) * Math.sin(lat2)
      );
      return [(lng2 * 180) / Math.PI, (lat2 * 180) / Math.PI];
    }

    // ===== ICON LOADING SYSTEM =====
    const POINT_ICON_BASE = 'https://raw.githubusercontent.com/mapillary/mapillary_sprite_source/master/package_objects/';
    const SIGN_ICON_BASE = 'https://raw.githubusercontent.com/mapillary/mapillary_sprite_source/master/package_signs/';
    const imageLoadCache = new Map();

    function getPointIconUrl(value) { return `${POINT_ICON_BASE}${value}.svg`; }
    function getSignIconUrl(value) { return `${SIGN_ICON_BASE}${value}.svg`; }

    async function loadSvgAsMapImage(url, cssSize) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`${res.status}`);
      const svgText = await res.text();
      const blob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
      const blobUrl = URL.createObjectURL(blob);
      try {
        const img = new Image();
        img.src = blobUrl;
        await img.decode();
        const pr = 2;
        const canvas = document.createElement('canvas');
        canvas.width = cssSize * pr;
        canvas.height = cssSize * pr;
        const ctx = canvas.getContext('2d');
        const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
        const dw = img.width * scale, dh = img.height * scale;
        ctx.drawImage(img, (canvas.width - dw) / 2, (canvas.height - dh) / 2, dw, dh);
        return { data: ctx.getImageData(0, 0, canvas.width, canvas.height), pixelRatio: pr };
      } finally { URL.revokeObjectURL(blobUrl); }
    }

    // Create a fallback colored circle image
    function createFallbackImage(color, size) {
      const pr = 2;
      const canvas = document.createElement('canvas');
      canvas.width = size * pr; canvas.height = size * pr;
      const ctx = canvas.getContext('2d');
      ctx.beginPath();
      ctx.arc(canvas.width / 2, canvas.height / 2, canvas.width / 2 - 2, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;
      ctx.stroke();
      return { data: ctx.getImageData(0, 0, canvas.width, canvas.height), pixelRatio: pr };
    }

    async function ensureMapImage(kind, value) {
      const imageId = `${kind}:${value}`;
      if (map.hasImage(imageId)) return;
      if (imageLoadCache.has(imageId)) return imageLoadCache.get(imageId);
      const promise = (async () => {
        try {
          const url = kind === 'pt' ? getPointIconUrl(value) : getSignIconUrl(value);
          const size = kind === 'pt' ? 32 : 36;
          const { data, pixelRatio } = await loadSvgAsMapImage(url, size);
          if (!map.hasImage(imageId)) map.addImage(imageId, data, { pixelRatio });
        } catch (e) {
          // Add fallback
          if (!map.hasImage(imageId)) {
            const color = kind === 'pt' ? '#7c3aed' : '#ff8400';
            const fb = createFallbackImage(color, 24);
            map.addImage(imageId, fb.data, { pixelRatio: fb.pixelRatio });
          }
        }
      })();
      imageLoadCache.set(imageId, promise);
      await promise;
      imageLoadCache.delete(imageId);
    }

    // ===== GENERIC FILTER PANEL =====
    function initFilterPanel({ dropdownBtnId, dropdownListId, tagsId, countId, downloadBtnId,
                               items, selectedSet, getIconUrl, layerId, onApply, allLabel }) {
      const dropdownBtn = document.getElementById(dropdownBtnId);
      const dropdownList = document.getElementById(dropdownListId);
      const tagsEl = document.getElementById(tagsId);
      const countEl = document.getElementById(countId);
      const downloadBtn = document.getElementById(downloadBtnId);

      // Add search input for filtering
      const searchEl = document.createElement('div');
      searchEl.style.cssText = 'padding:8px 10px;border-bottom:1px solid #e5e7eb;position:sticky;top:0;background:#fff;z-index:1;';
      searchEl.innerHTML = '<input type="text" placeholder="Search..." style="width:100%;padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:0.82rem;outline:none;">';
      dropdownList.appendChild(searchEl);
      const searchInput = searchEl.querySelector('input');
      searchInput.addEventListener('input', () => {
        const q = searchInput.value.toLowerCase();
        dropdownList.querySelectorAll('.filter-dropdown-item').forEach(el => {
          const text = el.textContent.toLowerCase();
          el.style.display = text.includes(q) ? '' : 'none';
        });
      });
      searchInput.addEventListener('click', e => e.stopPropagation());

      // Build dropdown items — "All" option first
      const allItems = [{ value: ALL_OPTION, label: allLabel || 'All' }, ...items];
      allItems.forEach(item => {
        const el = document.createElement('div');
        el.className = 'filter-dropdown-item';
        el.dataset.value = item.value;
        let iconHtml;
        if (item.value === ALL_OPTION) {
          iconHtml = '<span class="obj-icon" style="font-size:1.1rem;">🔵</span>';
        } else if (getIconUrl) {
          iconHtml = `<span class="obj-icon"><img src="${getIconUrl(item.value)}" alt="" loading="lazy" onerror="this.style.display='none'"></span>`;
        } else {
          iconHtml = `<span class="obj-icon" style="width:24px;height:24px;border-radius:4px;background:#ff8400;"></span>`;
        }
        el.innerHTML = `${iconHtml}<span>${item.label}${item.desc ? `<br><small style="color:#9ca3af;font-size:0.7rem">${item.desc}</small>` : ''}</span>`;
        el.addEventListener('click', () => {
          if (item.value === ALL_OPTION) {
            // Toggle "All" — clears specific selections
            if (selectedSet.has(ALL_OPTION)) {
              selectedSet.clear();
            } else {
              selectedSet.clear();
              selectedSet.add(ALL_OPTION);
            }
          } else {
            // Toggle specific item — remove "All" if present
            selectedSet.delete(ALL_OPTION);
            if (selectedSet.has(item.value)) {
              selectedSet.delete(item.value);
            } else {
              selectedSet.add(item.value);
            }
          }
          renderFilterState();
          dropdownList.classList.remove('open');
        });
        dropdownList.appendChild(el);
      });

      // Toggle dropdown
      dropdownBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        // Close other dropdowns
        document.querySelectorAll('.filter-dropdown-list.open').forEach(el => {
          if (el !== dropdownList) el.classList.remove('open');
        });
        dropdownList.classList.toggle('open');
      });

      // Download
      if (downloadBtn) {
        downloadBtn.addEventListener('click', () => downloadLayerFeatures(layerId));
      }

      function renderFilterState() {
        // Tags
        tagsEl.innerHTML = '';
        selectedSet.forEach(val => {
          const meta = items.find(i => i.value === val);
          if (!meta) return;
          const tag = document.createElement('span');
          tag.className = 'filter-tag';
          const imgTag = getIconUrl ? `<img src="${getIconUrl(val)}" alt="">` : '';
          tag.innerHTML = `${imgTag}${meta.label}<span class="tag-x">✕</span>`;
          tag.querySelector('.tag-x').addEventListener('click', () => {
            selectedSet.delete(val);
            renderFilterState();
          });
          tagsEl.appendChild(tag);
        });

        // Update dropdown selected state
        dropdownList.querySelectorAll('.filter-dropdown-item').forEach(el => {
          el.classList.toggle('selected', selectedSet.has(el.dataset.value));
        });

        // Count text
        if (selectedSet.size === 0) {
          countEl.textContent = '';
        } else {
          countEl.textContent = `Filtered: ${selectedSet.size} type${selectedSet.size > 1 ? 's' : ''}`;
        }

        // Apply map filter
        onApply(selectedSet);
      }

      renderFilterState();
    }

    const ALL_OPTION = '__ALL__';

    function applyPointFilter(selected) {
      if (!map || !map.getLayer('mly-feature-points')) return;
      if (selected.has(ALL_OPTION)) {
        map.setFilter('mly-feature-points', null); // show all
      } else if (selected.size === 0) {
        map.setFilter('mly-feature-points', ['==', ['get', 'value'], '__none__']); // hide all
      } else {
        map.setFilter('mly-feature-points', [
          'match', ['get', 'value'], [...selected], true, false
        ]);
      }
    }

    function applySignFilter(selected) {
      if (!map || !map.getLayer('mly-traffic-signs')) return;
      if (selected.has(ALL_OPTION)) {
        map.setFilter('mly-traffic-signs', null); // show all
      } else if (selected.size === 0) {
        map.setFilter('mly-traffic-signs', ['==', ['get', 'value'], '__none__']); // hide all
      } else {
        map.setFilter('mly-traffic-signs', [
          'match', ['get', 'value'], [...selected], true, false
        ]);
      }
    }

    function downloadLayerFeatures(layerId) {
      if (!map) return;
      const features = map.queryRenderedFeatures({ layers: [layerId] });
      if (!features.length) { alert('Không có dữ liệu hiển thị để tải.'); return; }
      const geojson = {
        type: 'FeatureCollection',
        features: features.map(f => ({ type: 'Feature', geometry: f.geometry, properties: f.properties })),
      };
      const blob = new Blob([JSON.stringify(geojson, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url;
      a.download = layerId + '.json'; a.click();
      URL.revokeObjectURL(url);
    }

      detPage++;

    function closeDetectionPanel() {

    async function openDetectionPanel(mapFeatureId, label, iconUrl, coords) {
      // Show panel immediately with loading state
      detTitle.textContent = label;
      detIcon.src = iconUrl;
      detIcon.onerror = () => { detIcon.style.display = 'none'; };
      detList.innerHTML = '<div style="padding:32px;text-align:center;color:#9ca3af;">Loading detections...</div>';
      detPageInfo.textContent = '';
      detNextBtn.style.display = 'none';
      detPanel.classList.add('open');

      try {
        // Fetch detections via local backend API (cache-on-read)
        const res = await fetch(
          `http://localhost:3000/api/v1/map-features/${mapFeatureId}/detections`
        );
        const json = await res.json();
        const detData = json.data || [];

        if (detData.length === 0) {
          detList.innerHTML = '<div style="padding:32px;text-align:center;color:#9ca3af;">No detections found.</div>';
          return;
        }

        // Detections already have _thumb data from backend (cached with thumb URLs)
        allDetections = detData;
        detPage = 0;

        renderDetectionPage();
      } catch (err) {
        console.warn('Detection fetch failed:', err);
        detList.innerHTML = '<div style="padding:32px;text-align:center;color:#e05643;">Failed to load detections.</div>';
      }
    }

    function renderDetectionPage() {
      const start = detPage * DET_PER_PAGE;
      const pageItems = allDetections.slice(start, start + DET_PER_PAGE);
      const total = allDetections.length;
      const hasMore = start + DET_PER_PAGE < total;

      detList.innerHTML = '';

      pageItems.forEach((det, i) => {
        const num = start + i + 1;
        const thumbUrl = det._thumb?.thumb_1024_url
          ? (det._thumb.thumb_1024_url.startsWith('/') ? `http://localhost:3000${det._thumb.thumb_1024_url}` : det._thumb.thumb_1024_url)
          : '';
        const imgW = det._thumb?.width || 1;
        const imgH = det._thumb?.height || 1;

        const card = document.createElement('div');
        card.className = 'detection-card';

        // Decode bounding box from base64 MVT geometry
        let bboxHtml = '';
        if (det.geometry) {
          const bbox = decodeBboxSimple(det.geometry, imgW, imgH);
          if (bbox) {
            bboxHtml = `<div class="detection-bbox" style="left:${bbox.x}%;top:${bbox.y}%;width:${bbox.w}%;height:${bbox.h}%"></div>`;
          }
        }

        card.innerHTML = `
          <div class="detection-card-header">
            <span class="det-num">${num}</span>
          </div>
          <div class="detection-card-img">
            ${thumbUrl ? `<img src="${thumbUrl}" alt="Detection ${num}" loading="lazy">` : '<div style="padding:40px;text-align:center;color:#9ca3af;">No image</div>'}
            ${bboxHtml}
          </div>
        `;

        // Click card → navigate viewer to that image
        card.addEventListener('click', () => {
          navigateViewer(String(det.image.id));
        });

        detList.appendChild(card);
      });

      detPageInfo.textContent = `${Math.min(start + DET_PER_PAGE, total)} of ${total}`;
      detNextBtn.style.display = hasMore ? '' : 'none';
      detNextBtn.textContent = `Next ${Math.min(DET_PER_PAGE, total - start - DET_PER_PAGE)}`;

      detList.scrollTop = 0;
    }

    // Decode base64 MVT geometry to a simple bounding box (percentage)
    function decodeBboxSimple(base64Geom, imgW, imgH) {
      try {
        const binary = Uint8Array.from(atob(base64Geom), c => c.charCodeAt(0));
        // Parse simple MVT to extract coordinates
        // MVT uses protobuf — we'll do a lightweight parse for the geometry
        const coords = extractMVTCoords(binary);
        if (!coords || coords.length < 3) return null;

        // Find bounding box of the polygon
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        const extent = 4096; // standard MVT extent
        coords.forEach(([x, y]) => {
          const nx = x / extent;
          const ny = y / extent;
          if (nx < minX) minX = nx;
          if (ny < minY) minY = ny;
          if (nx > maxX) maxX = nx;
          if (ny > maxY) maxY = ny;
        });

        return {
          x: (minX * 100).toFixed(1),
          y: (minY * 100).toFixed(1),
          w: ((maxX - minX) * 100).toFixed(1),
          h: ((maxY - minY) * 100).toFixed(1),
        };
      } catch (e) {
        return null;
      }
    }

    // Lightweight MVT protobuf coordinate extractor
    function extractMVTCoords(data) {
      try {
        // MVT structure: tile → layers → features → geometry
        // We'll scan for geometry field (tag 4 in feature) using zigzag decoding
        // This is a simplified parser that works for Mapillary detection geometries

        let pos = 0;
        function readVarint() {
          let result = 0, shift = 0;
          while (pos < data.length) {
            const b = data[pos++];
            result |= (b & 0x7f) << shift;
            if ((b & 0x80) === 0) return result;
            shift += 7;
          }
          return result;
        }

        function skipField(wireType) {
          if (wireType === 0) readVarint();
          else if (wireType === 1) pos += 8;
          else if (wireType === 2) pos += readVarint();
          else if (wireType === 5) pos += 4;
        }

        // Find the geometry commands in the MVT
        // Scan through the protobuf to find repeated uint32 (field 4, type 2 packed)
        const coords = [];
        let cx = 0, cy = 0;

        // Simple approach: find all varint sequences that look like geometry commands
        function parseGeometry(geomData) {
          let gp = 0;
          const pts = [];
          let px = 0, py = 0;

          function gReadVarint() {
            let r = 0, s = 0;
            while (gp < geomData.length) {
              const b = geomData[gp++];
              r |= (b & 0x7f) << s;
              if ((b & 0x80) === 0) return r;
              s += 7;
            }
            return r;
          }

          while (gp < geomData.length) {
            const cmdInt = gReadVarint();
            const cmd = cmdInt & 0x7;
            const count = cmdInt >> 3;

            if (cmd === 1 || cmd === 2) {
              for (let i = 0; i < count; i++) {
                const dx = gReadVarint();
                const dy = gReadVarint();
                px += ((dx >> 1) ^ -(dx & 1));
                py += ((dy >> 1) ^ -(dy & 1));
                pts.push([px, py]);
              }
            } else if (cmd === 7) {
              // ClosePath
            }
          }
          return pts;
        }

        // Parse top-level: find layer → feature → geometry
        while (pos < data.length) {
          const tag = readVarint();
          const fieldNum = tag >> 3;
          const wireType = tag & 0x7;

          if (wireType === 2) {
            const len = readVarint();
            const end = pos + len;

            if (fieldNum === 3) {
              // layers
              const layerEnd = end;
              while (pos < layerEnd) {
                const ltag = readVarint();
                const lfn = ltag >> 3;
                const lwt = ltag & 0x7;
                if (lwt === 2) {
                  const llen = readVarint();
                  const lend = pos + llen;
                  if (lfn === 2) {
                    // feature
                    const featEnd = lend;
                    while (pos < featEnd) {
                      const ftag = readVarint();
                      const ffn = ftag >> 3;
                      const fwt = ftag & 0x7;
                      if (fwt === 2 && ffn === 4) {
                        // geometry (packed uint32)
                        const glen = readVarint();
                        const geomBytes = data.slice(pos, pos + glen);
                        pos += glen;
                        return parseGeometry(geomBytes);
                      } else {
                        skipField(fwt);
                      }
                    }
                  } else {
                    pos = lend;
                  }
                } else {
                  skipField(lwt);
                }
              }
            } else {
              pos = end;
            }
          } else {
            skipField(wireType);
          }
        }
        return null;
      } catch (e) {
        return null;
      }
    }
